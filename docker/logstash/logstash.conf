input {
  file {
    path => ["/var/log/app/*.log", "/var/log/sgsg-api/*.log"]
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
  }
  
  # PM2 로그도 수집
  file {
    path => "/var/log/pm2/sgsg-api-*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "pm2"
  }
}

filter {
  # JSON 파싱 (이미 json codec 사용)
  # 추가 필터링 필요 시 추가
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "sgsg-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}