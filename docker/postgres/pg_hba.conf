# PostgreSQL 클라이언트 인증 설정
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# 로컬 연결 (Unix socket)
local   all             all                                     scram-sha-256

# IPv4 로컬 연결 (컨테이너 내부)
host    sgsg_db         sgsg            127.0.0.1/32            scram-sha-256
host    sgsg_db         sgsg_app        127.0.0.1/32            scram-sha-256

# Docker 네트워크에서의 연결만 허용
host    sgsg_db         sgsg            172.0.0.0/8             scram-sha-256
host    sgsg_db         sgsg_app        172.0.0.0/8             scram-sha-256

# 호스트 머신에서의 개발 연결
host    sgsg_db         sgsg            host.docker.internal/32 scram-sha-256  
host    sgsg_db         sgsg_app        host.docker.internal/32 scram-sha-256

# 외부 연결 차단 (보안)
# host    all             all             0.0.0.0/0               reject

# IPv6 연결 차단  
# host    all             all             ::1/128                 reject