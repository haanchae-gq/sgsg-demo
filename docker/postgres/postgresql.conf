# PostgreSQL 프로덕션 보안 설정

# 연결 설정
max_connections = 50                    # 최대 연결 수 제한
shared_preload_libraries = ''          # 불필요한 확장 비활성화

# 로깅 설정 (보안 감사)
log_connections = on
log_disconnections = on
log_duration = off
log_statement = 'none'

# 인증 및 보안
password_encryption = scram-sha-256
ssl = off                               # 로컬 환경용 (프로덕션에서는 on)

# 성능 최적화
shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 64MB
checkpoint_completion_target = 0.9
wal_buffers = 16MB

# 타임아웃 설정
statement_timeout = 300000              # 5분 (300초)
idle_in_transaction_session_timeout = 60000  # 1분

# 감사 로그
logging_collector = on
log_directory = '/var/lib/postgresql/data/log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_truncate_on_rotation = on