global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'sgsg-api'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:4000']
        labels:
          service: 'sgsg-api'
          environment: 'production'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9092']