# SGSG 플랫폼 Nginx 설정 - SSL Reverse Proxy

# HTTP 서버 (HTTPS로 리다이렉트 + Let's Encrypt용)
server {
    listen 80;
    server_name 115.68.102.153 sgsg.local;  # 도메인 정보 받으면 업데이트
    
    # Let's Encrypt 인증 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    
    # 나머지 모든 요청은 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 서버 (SSL 종료점)
server {
    listen 443 ssl;
    http2 on;
    server_name 115.68.102.153 sgsg.local;  # 도메인 정보 받으면 업데이트
    
    # SSL 인증서 (자체 서명 - 테스트용)
    ssl_certificate /etc/nginx/ssl/sgsg.crt;
    ssl_certificate_key /etc/nginx/ssl/sgsg.key;
    
    # SSL 보안 설정 (Mozilla Modern Config)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    
    # API 백엔드 (4000포트)
    location /api/ {
        proxy_pass http://115.68.102.153:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        
        # Rate limiting for API
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
    }
    
    # 인증 API 특별 Rate Limiting
    location /api/v1/auth/ {
        proxy_pass http://115.68.102.153:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # 더 엄격한 인증 API Rate Limiting
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
    }
    
    # 관리자 대시보드 (3001포트)
    location /admin {
        proxy_pass http://115.68.102.153:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
    
    # 전문가 모바일 앱 (3002포트) 
    location /expert {
        proxy_pass http://115.68.102.153:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
    
    # 고객 모바일 앱 (3003포트)
    location /customer {
        proxy_pass http://115.68.102.153:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';  
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
    
    # 기본 헬스체크
    location /health {
        proxy_pass http://115.68.102.153:4000/health;
        proxy_set_header Host $host;
        access_log off;  # 헬스체크 로그 제외
    }
    
    # 기본 루트 (관리자 대시보드로 리다이렉트)
    location / {
        return 301 https://$host/admin/;
    }
    
    # 정적 파일 서빙 (업로드된 파일들)
    location /uploads/ {
        proxy_pass http://115.68.102.153:4000/uploads/;
        expires 1M;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}