version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sgsg-postgres
    environment:
      POSTGRES_USER: sgsg
      POSTGRES_PASSWORD: sgsg5goqual123!
      POSTGRES_DB: sgsg_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgsg -d sgsg_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgsg-network

