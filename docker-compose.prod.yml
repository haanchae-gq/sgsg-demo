version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sgsg-postgres-prod
    environment:
      POSTGRES_USER: ${DB_USER:-sgsg}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sgsg5goqual123!}
      POSTGRES_DB: ${DB_NAME:-sgsg_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sgsg} -d ${DB_NAME:-sgsg_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgsg-network-prod
    restart: unless-stopped

  # Backend API Service
  backend:
    build:
      context: ./sgsg-api
      dockerfile: Dockerfile.prod
    container_name: sgsg-backend-prod
    environment:
      NODE_ENV: production
      DB_URL: postgresql://${DB_USER:-sgsg}:${DB_PASSWORD:-sgsg5goqual123!}@postgres:5432/${DB_NAME:-sgsg_db}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./sgsg-api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sgsg-network-prod
    restart: unless-stopped

  # Admin Dashboard
  admin:
    build:
      context: ./sgsg-adm
      dockerfile: Dockerfile.prod
    container_name: sgsg-admin-prod
    environment:
      NODE_ENV: production
      VITE_API_URL: /api
    volumes:
      - ./sgsg-adm:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - sgsg-network-prod
    restart: unless-stopped

  # Expert Web App
  expert:
    build:
      context: ./sgsg-exp
      dockerfile: Dockerfile.prod
    container_name: sgsg-expert-prod
    environment:
      NODE_ENV: production
      VITE_API_URL: /api
    volumes:
      - ./sgsg-exp:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - sgsg-network-prod
    restart: unless-stopped

  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: sgsg-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/letsencrypt
      - ./docker/nginx/html:/var/www/html
      - ./docker/nginx/certbot:/var/www/certbot
      - ./sgsg-adm/dist:/var/www/html/admin
      - ./sgsg-exp/dist:/var/www/html/expert
    depends_on:
      - backend
      - admin
      - expert
    networks:
      - sgsg-network-prod
    restart: unless-stopped

  # Certbot for SSL certificate management
  certbot:
    image: certbot/certbot
    container_name: sgsg-certbot-prod
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./docker/nginx/certbot:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${CERTBOT_EMAIL:-admin@example.com} --agree-tos --no-eff-email -d ${DOMAIN_NAME:-example.com} -d www.${DOMAIN_NAME:-example.com}
    depends_on:
      - nginx
    networks:
      - sgsg-network-prod
    restart: unless-stopped

volumes:
  postgres_data_prod:
    driver: local

networks:
  sgsg-network-prod:
    driver: bridge